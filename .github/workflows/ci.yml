name: Validate research artifact

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  data-free-validation:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install validation dependencies
        run: python -m pip install --upgrade pip pyyaml rdflib

      - name: Compile source
        run: python -m compileall src experiments

      - name: Validate public artifact
        run: python -m unittest discover -s tests -v
