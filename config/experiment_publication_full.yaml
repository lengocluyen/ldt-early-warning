data_dir: Oulab
results_dir: results
namespace: http://example.org/ldt#
kg_feature_engine: indexed
checkpoints:
  - day: 28
    name: Week 4
  - day: 56
    name: Week 8
  - day: 84
    name: Week 12
modules: null
top_k:
  - 3
  - 5
alert_threshold: 0.5
random_state: 42
max_scale_pos_weight: 20
extended_models: true
xgboost_grid_search: true
n_jobs: -1
xgboost:
  n_estimators: 300
  max_depth: 3
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  reg_lambda: 5
xgboost_search_space:
  n_estimators: [100, 300, 500]
  max_depth: [3, 5, 7]
  learning_rate: [0.01, 0.05, 0.1]
  subsample: [0.8, 1.0]
  colsample_bytree: [0.8, 1.0]
  reg_lambda: [1, 5, 10]
